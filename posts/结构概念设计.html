<h1 class="title">结构概念设计</h1>
<blockquote>
<p>
概念设计一般是指不经数值计算，依据整体结构体系与分体系之间的力学关系、材料性能、制作水平技术、结构破坏机理、试验现象所获得的基本设计原则和设计思想，从整体的角度来确定力学架构的体系和细部措施的宏观控制。
</p>
</blockquote>
